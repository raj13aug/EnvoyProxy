apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-router-app
  labels:
    app: simple-router
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simple-router
  template:
    metadata:
      labels:
        app: simple-router
    spec:
      containers:
      - name: simple-router-container
        image: nginx
        ports:
        - containerPort: 80